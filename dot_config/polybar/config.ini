[colors]
background = #1a1b26
foreground = #e0af68
primary = #7aa2f7

[bar/mybar]
width = 100%
height = 24pt
radius = 0

tray-position = right
tray-padding = 2
tray-maxsize = 16

background = ${colors.background}
foreground = ${colors.foreground}

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.primary}

font-0 = "JetBrainsMono Nerd Font:size=10;2"

modules-left = 
modules-center = time
modules-right = mediaplayer volume split_mode

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

[module/time]
type = internal/date
interval = 1
# This matches your date '+%Y-%m-%d %H:%M:%S' format
date = %Y-%m-%d %H:%M:%S
label = %date%
label-foreground = ${colors.foreground}

[module/mediaplayer]
type = custom/script
exec = ~/.config/i3/scripts/mediaplayer.sh
interval = 5

[module/split_mode]
type = custom/script
exec = cat /tmp/i3_split_mode 2>/dev/null || echo "H"
interval = 1

[module/volume]
type = custom/script
exec = ~/.config/i3/scripts/volume.sh
interval = 1
label = VOL %output%

[settings]
screenchange-reload = true
pseudo-transparency = true
